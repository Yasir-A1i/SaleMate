<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaleMate-A Sale manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav">
        <div class="logo"></div>
        <div class="list">
            <a href="index.html">
                <div class="icon  dashboard">
                    <div>Dashboard</div>
                </div>
            </a>
            <a href="profile.html">
                <div class="icon profile">
                    <div>Profile</div>
                </div>
            </a>
            <a href="leaderboard.html">
                <div class="icon leader">
                    <div>Leaderboard</div>
                </div>
            </a>
            <a href="order.html">
                <div class="icon order">
                    <div>Orders</div>
                </div>
            </a>
            <a href="product.html">
                <div class="icon product">
                    <div>Product</div>
                </div>
            </a>
            <a href="sales.html">
                <div class="icon sales">
                    <div>Sales Report</div>
                </div>
            </a>
            <a href="msg.html">
                <div class="icon msg">
                    <div>Messages</div>
                </div>
            </a>
            <a href="setting.html">
                <div class="icon setting">
                    <div>Settings</div>
                </div>
            </a>
            <a href="fav.html">
                <div class="icon fav">
                    <div>Favourites</div>
                </div>
            </a>
            <a href="history.html">
                <div class="icon history">
                    <div>History</div>
                </div>
            </a>
            <a href="log.html">
                <div class="icon log">
                    <div>Logout</div>
                </div>
        </div></a>
    </div>




    <div class="content">
        <div class="firstportion">
            <img src="searchicon.svg" id="searchicon" alt="search icon">
            <input placeholder="Search here..." type="text" name="Search here" id="search" class="search"> 
            <div class="profileicon">
               <a href="msg.html"><img src="bell.svg" id="notification_bell_icon" alt="Notifications"></a>
                <a href="profile.html"><img src="yasir.jpg" id="user_profile_pic" alt="user_profile_pic"></a>  
                <a href="profile.html"> <img src="more.png" alt="more_options">  </a>  
            </div>
        </div>
        
        <div id="secondportion">
            <div id="todaysales">
                <h2 class="heading">Taday's Sales</h2>
                <p class="para">Sales Summary</p>
                <div id="salesdata">
                    <a href="sales.html"><div class="saledata">
                        <img src="saleicon1.svg" alt="total_Sale_icon">
                        <h3 class="quantity">$5k</h3>
                        <p class="coloredtext1">+10% from yesterday</p>
                    </div></a>
                    <a href="sales.html"> <div class="saledata">
                        <img src="saleicon2.svg" alt="total_order_icon">
                        <h3 class="quantity">500</h3>
                        <p class="coloredtext2">+8% from yesterday</p>
                    </div></a>
                    <a href="sales.html"><div class="saledata">
                        <img src="saleicon3.svg" alt="product-sold_icon">
                        <h3 class="quantity">9</h3>
                        <p class="coloredtext3">+2% from yesterday</p>
                    </div></a>
                    <a href="sales.html"><div class="saledata">
                        <img src="saleicon4,svg.svg" alt="new_cunstomer_icon">
                        <h3 class="quantity">12</h3>
                        <p class="coloredtext4">+3% from yesterday</p>
                    </div></a>
                </div>
            </div>
            <div id="level">
                <h2 class="heading">Level</h2>
                <div class="linegraph">
                    <div class="line" id="line1"></div>
                    <div class="line" id="line2"></div>
                    <div class="line" id="line3"></div>
                    <div class="line" id="line4"></div>
                    <div class="line" id="line5"></div>
                    <div class="line" id="line6"></div>
                </div>
                <div id="volume_service">
                    <div id="volume">Volume</div>
                    <div id="service">Service</div>
                </div>
            </div>
        </div>
        <div id="thirdportion">
            <div id="topproducts">
                <h2 class="heading">Top Products</h2>
                <div id="tablerowheading">
                    <div id="hash" class="thdata">#</div>
                    <div id="name" class="thdata">Name</div>
                    <div id="popular" class="thdata">Popularity</div>
                    <div id="salespecentage" class="thdata">Sales</div>
                </div>
                <div class="tablerow1"></div>
                <div class="tablerow2"></div>
                <div class="tablerow3"></div>
                <div class="tablerow4"></div>
            </div>
            <div id="customerfullfilment"></div>
        </div>
        <div id="forthportion">
            <div id="earning"></div>
            <div id="visitorinsight"></div>
        </div>

        




        <script src="script.js"></script>
</body>

</html>
